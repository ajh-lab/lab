apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: openbrain-runtime-secret
  namespace: openbrain
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao-store
  target:
    name: openbrain-runtime-secret
    creationPolicy: Owner
  data:
    - secretKey: db-host
      remoteRef:
        key: lab/runtime/openbrain
        property: db_host
    - secretKey: db-port
      remoteRef:
        key: lab/runtime/openbrain
        property: db_port
    - secretKey: db-name
      remoteRef:
        key: lab/runtime/openbrain
        property: db_name
    - secretKey: db-user
      remoteRef:
        key: lab/runtime/openbrain
        property: db_user
    - secretKey: db-password
      remoteRef:
        key: lab/runtime/openbrain
        property: db_password
    - secretKey: postgres-password
      remoteRef:
        key: lab/runtime/openbrain
        property: postgres_password
    - secretKey: mcp-access-key
      remoteRef:
        key: lab/runtime/openbrain
        property: mcp_access_key
    - secretKey: embedding-api-base
      remoteRef:
        key: lab/runtime/openbrain
        property: embedding_api_base
    - secretKey: embedding-api-key
      remoteRef:
        key: lab/runtime/openbrain
        property: embedding_api_key
    - secretKey: embedding-model
      remoteRef:
        key: lab/runtime/openbrain
        property: embedding_model
    - secretKey: chat-api-base
      remoteRef:
        key: lab/runtime/openbrain
        property: chat_api_base
    - secretKey: chat-api-key
      remoteRef:
        key: lab/runtime/openbrain
        property: chat_api_key
    - secretKey: chat-model
      remoteRef:
        key: lab/runtime/openbrain
        property: chat_model
