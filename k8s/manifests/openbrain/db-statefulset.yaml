apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openbrain-db
  namespace: openbrain
spec:
  serviceName: openbrain-db
  replicas: 1
  selector:
    matchLabels:
      app: openbrain-db
  template:
    metadata:
      labels:
        app: openbrain-db
    spec:
      containers:
        - name: postgres
          image: ankane/pgvector:v0.5.1
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: openbrain
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openbrain-runtime-secret
                  key: postgres-password
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: init-sql
          configMap:
            name: openbrain-init-sql
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 20Gi
